[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php]
command=docker-php-entrypoint php-fpm
user=root
autostart=true
autorestart=true
priority=5

[program:nginx]
command=nginx -g "daemon off;"
user=root
autostart=true
autorestart=true
priority=10
